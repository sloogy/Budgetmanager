name: Build Executables

on:
  push:
    tags:
      - 'v*'          # Trigger: git tag v1.0.24 && git push origin v1.0.24

permissions:
  contents: write

jobs:
  # ── Job 1+2: Parallel Builds ─────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: BudgetManager-windows.exe
            pyinstaller_output: dist/BudgetManager.exe

          - os: ubuntu-latest
            artifact_name: BudgetManager-linux
            pyinstaller_output: dist/BudgetManager

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install PySide6 openpyxl cryptography requests packaging pyinstaller

      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y upx-ucl

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx --no-progress -y

      - name: Build with PyInstaller
        run: pyinstaller BudgetManager.spec --noconfirm

      - name: Rename artifact
        shell: bash
        run: mv "${{ matrix.pyinstaller_output }}" "${{ matrix.artifact_name }}"

      - name: Upload artifact (for manifest job)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  # ── Job 3: ZIP + latest.json generieren & hochladen ──────────────────
  manifest:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: BudgetManager-windows.exe
          path: artifacts/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: BudgetManager-linux
          path: artifacts/

      - name: Build portable ZIP + latest.json
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          ZIP_NAME="BudgetManager-${TAG}-portable.zip"

          # ── Ordnerstruktur aufbauen ──────────────────────────────────
          mkdir -p portable/data/backups

          # Executables
          cp artifacts/BudgetManager-windows.exe portable/BudgetManager-windows.exe
          cp artifacts/BudgetManager-linux        portable/BudgetManager-linux
          chmod +x portable/BudgetManager-linux

          # Platzhalter damit data/ nicht leer ist
          touch portable/data/.keep
          touch portable/data/backups/.keep

          # Linux-Starter-Skript (setzt chmod und startet)
          cat > portable/start-linux.sh <<'STARTER'
          #!/usr/bin/env bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          chmod +x "$DIR/BudgetManager-linux"
          exec "$DIR/BudgetManager-linux" "$@"
          STARTER
          chmod +x portable/start-linux.sh

          # README
          cat > portable/README.txt <<RDME
          BudgetManager ${VERSION} — Portable
          =====================================
          Windows : Doppelklick auf BudgetManager-windows.exe
          Linux   : ./start-linux.sh  (oder chmod +x BudgetManager-linux && ./BudgetManager-linux)

          Daten (DB, Einstellungen, Backups) werden in ./data/ gespeichert.
          Stick einfach mitnehmen — alles bleibt portabel.
          RDME

          # ── ZIP erstellen ────────────────────────────────────────────
          cd portable && zip -r "../${ZIP_NAME}" . && cd ..

          # ── SHA256 berechnen ─────────────────────────────────────────
          WIN_SHA=$(sha256sum "artifacts/BudgetManager-windows.exe" | awk '{print $1}')
          LIN_SHA=$(sha256sum "artifacts/BudgetManager-linux"        | awk '{print $1}')
          ZIP_SHA=$(sha256sum "${ZIP_NAME}"                           | awk '{print $1}')

          # ── latest.json schreiben ────────────────────────────────────
          cat > latest.json <<EOF
          {
            "app": "Budgetmanager",
            "channel": "stable",
            "version": "${VERSION}",
            "release_tag": "${TAG}",
            "assets": {
              "windows": {
                "type": "portable",
                "url": "${BASE}/BudgetManager-windows.exe",
                "sha256": "${WIN_SHA}"
              },
              "linux": {
                "type": "portable",
                "url": "${BASE}/BudgetManager-linux",
                "sha256": "${LIN_SHA}"
              },
              "portable_zip": {
                "type": "portable-zip",
                "url": "${BASE}/${ZIP_NAME}",
                "sha256": "${ZIP_SHA}"
              }
            }
          }
          EOF

          echo "ZIP: ${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          cat latest.json

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/BudgetManager-windows.exe
            artifacts/BudgetManager-linux
            ${{ env.ZIP_NAME }}
            latest.json
