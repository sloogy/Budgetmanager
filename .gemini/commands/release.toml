description = "Erstellt RELEASE_NOTES.md aus den letzten Git-Änderungen (log + diff-stat)."
prompt = """
Erstelle RELEASE_NOTES.md im Repo-Root.

Git-Kontext:
- Letzte Commits:
!{git --no-pager log -15 --oneline}

- Diff-Stat:
!{git --no-pager diff --stat}

Regeln:
- Keine erfundenen Features.
- Struktur:
  1) Kurzsummary (3–7 Bulletpoints)
  2) Fixes / Changes / Known Issues
  3) How to test (3–6 Schritte)

Schreibe die Datei mit dem write_file Tool.
"""
